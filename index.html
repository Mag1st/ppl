<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0A0A0A"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="PPL"/>
  <title>PPL Workout</title>
  <link rel="manifest" href="manifest.json"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{min-height:100vh;background:#0A0A0A;font-family:Georgia,serif;color:#F0EDE6;overscroll-behavior:none;}
    :root{--safe-top:env(safe-area-inset-top,0px);}

    /* NAV */
    #nav{display:flex;border-bottom:1px solid #1a1a1a;background:#0A0A0A;position:sticky;top:0;z-index:10;}
    .nav-btn{flex:1;padding:16px 8px;background:transparent;border:none;border-bottom:2px solid transparent;
      color:#444;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;
      transition:all 0.2s;font-family:Georgia,serif;}
    .nav-btn.active{color:#F0EDE6;border-bottom-color:#F0EDE6;}

    /* PAGES */
    .page{display:none;} .page.active{display:block;}

    /* ===== PLAN PAGE ===== */
    #header{border-bottom:1px solid #222;padding:28px 20px 20px;display:flex;justify-content:space-between;align-items:flex-end;}
    #header .label{font-size:10px;letter-spacing:4px;color:#666;text-transform:uppercase;margin-bottom:5px;}
    #header h1{font-size:clamp(22px,6vw,40px);font-weight:normal;letter-spacing:-1px;line-height:1;}
    #header .stats{text-align:right;font-size:11px;color:#555;letter-spacing:1px;}
    #header .stats div+div{margin-top:3px;}

    #week-strip{display:flex;border-bottom:1px solid #1a1a1a;overflow-x:auto;}
    .day-cell{flex:1;min-width:44px;padding:12px 6px;text-align:center;border-right:1px solid #1a1a1a;transition:background 0.2s;}
    .day-cell.clickable{cursor:pointer;}
    .day-name{font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
    .day-dot{width:26px;height:26px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;transition:all 0.2s;}
    .day-type{font-size:8px;letter-spacing:1px;text-transform:uppercase;margin-top:5px;}

    #tabs{display:flex;border-bottom:1px solid #1a1a1a;}
    .tab-btn{flex:1;padding:16px 8px;background:transparent;border:none;border-bottom:2px solid transparent;
      color:#444;font-size:12px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;font-family:Georgia,serif;}

    #plan-content{padding:24px 20px;}
    .day-tags{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
    .day-tag{padding:4px 12px;border-radius:2px;font-size:10px;letter-spacing:2px;text-transform:uppercase;}

    #exercise-list{display:flex;flex-direction:column;gap:2px;}
    .exercise-row{display:grid;grid-template-columns:28px 1fr auto;align-items:center;gap:12px;
      padding:16px 16px;background:#0f0f0f;border-left:3px solid #1a1a1a;cursor:pointer;transition:all 0.2s;}
    .exercise-row:active{background:#1a1a1a;}
    .ex-num{font-size:10px;color:#333;font-family:monospace;letter-spacing:1px;}
    .ex-name{font-size:15px;font-weight:normal;letter-spacing:-0.3px;margin-bottom:3px;}
    .key-badge{margin-left:8px;font-size:8px;letter-spacing:2px;text-transform:uppercase;
      padding:2px 5px;border-radius:2px;border:1px solid;vertical-align:middle;}
    .ex-note{font-size:11px;color:#555;letter-spacing:0.3px;}
    .ex-right{text-align:right;white-space:nowrap;}
    .ex-sets{font-size:17px;font-variant-numeric:tabular-nums;letter-spacing:-0.5px;}
    .ex-sets span{font-size:10px;color:#444;}
    .ex-reps{font-size:12px;color:#555;margin-top:2px;}
    .ex-best{font-size:10px;margin-top:4px;opacity:0.7;}

    #notes-bar{margin-top:28px;padding:16px 18px;border:1px solid #1a1a1a;display:flex;gap:24px;flex-wrap:wrap;}
    .note-block .note-label{font-size:9px;letter-spacing:3px;color:#444;text-transform:uppercase;margin-bottom:5px;}
    .note-block .note-val{font-size:13px;color:#888;}

    /* ===== LOG MODAL ===== */
    #modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;
      align-items:flex-end;justify-content:center;}
    #modal-overlay.open{display:flex;}
    #modal{background:#111;width:100%;max-width:480px;border-radius:16px 16px 0 0;
      padding:24px 20px 40px;max-height:90vh;overflow-y:auto;}
    #modal-title{font-size:18px;font-weight:normal;margin-bottom:4px;}
    #modal-sub{font-size:11px;color:#555;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;}

    .set-row{display:grid;grid-template-columns:28px 1fr 1fr auto;gap:8px;align-items:center;margin-bottom:8px;}
    .set-num{font-size:11px;color:#444;font-family:monospace;text-align:center;}
    .set-input{background:#1a1a1a;border:1px solid #2a2a2a;color:#F0EDE6;font-size:15px;
      padding:10px 12px;border-radius:6px;font-family:Georgia,serif;width:100%;text-align:center;
      -webkit-appearance:none;}
    .set-input:focus{outline:none;border-color:#444;}
    .set-input::placeholder{color:#333;}
    .set-label{font-size:9px;color:#444;letter-spacing:2px;text-transform:uppercase;text-align:center;margin-bottom:4px;}
    .set-done-btn{background:transparent;border:1px solid #2a2a2a;color:#555;width:32px;height:40px;
      border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
    .set-done-btn.done{background:#1a2a1a;border-color:#1CCF6A;color:#1CCF6A;}

    .modal-actions{display:flex;gap:10px;margin-top:20px;}
    .btn-save{flex:1;padding:14px;background:#F0EDE6;color:#0A0A0A;border:none;border-radius:8px;
      font-size:13px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:Georgia,serif;}
    .btn-close{padding:14px 20px;background:transparent;color:#555;border:1px solid #2a2a2a;
      border-radius:8px;font-size:13px;cursor:pointer;font-family:Georgia,serif;}

    .prev-best{background:#141414;border-radius:6px;padding:10px 14px;margin-bottom:16px;
      font-size:12px;color:#666;border-left:3px solid #2a2a2a;}
    .prev-best strong{color:#aaa;}

    /* ===== HISTORY PAGE ===== */
    #history-content{padding:24px 20px;}
    #history-content h2{font-size:20px;font-weight:normal;margin-bottom:6px;}
    #history-content .sub{font-size:11px;color:#555;letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;}

    .history-session{margin-bottom:24px;border:1px solid #1a1a1a;border-radius:4px;overflow:hidden;}
    .session-header{padding:14px 16px;background:#0f0f0f;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
    .session-title{font-size:14px;letter-spacing:-0.3px;}
    .session-date{font-size:11px;color:#555;letter-spacing:1px;}
    .session-type-badge{font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:2px;border:1px solid;}
    .session-body{padding:12px 16px;display:none;}
    .session-body.open{display:block;}
    .history-ex{margin-bottom:12px;}
    .history-ex-name{font-size:13px;color:#aaa;margin-bottom:6px;}
    .history-sets-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;}
    .history-set-chip{background:#141414;border-radius:4px;padding:6px 8px;text-align:center;}
    .history-set-chip .weight{font-size:14px;color:#F0EDE6;}
    .history-set-chip .reps-done{font-size:10px;color:#555;margin-top:2px;}
    .no-history{text-align:center;padding:48px 20px;color:#333;font-size:14px;}

    .clear-btn{background:transparent;border:1px solid #2a2a2a;color:#555;padding:8px 16px;
      border-radius:4px;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;
      font-family:Georgia,serif;margin-bottom:20px;}
    .clear-btn:active{border-color:#FF4D1C;color:#FF4D1C;}

    /* ===== PROGRESS PAGE ===== */
    #progress-content{padding:24px 20px;}
    #progress-content h2{font-size:20px;font-weight:normal;margin-bottom:6px;}
    #progress-content .sub{font-size:11px;color:#555;letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;}
    .progress-ex-card{margin-bottom:20px;border:1px solid #1a1a1a;border-radius:4px;overflow:hidden;}
    .progress-ex-header{padding:12px 16px;background:#0f0f0f;display:flex;justify-content:space-between;}
    .progress-ex-name{font-size:13px;}
    .progress-best{font-size:12px;color:#666;}
    .progress-best strong{font-size:14px;}
    .progress-chart{padding:12px 16px;height:80px;position:relative;overflow:hidden;}
    .chart-bars{display:flex;align-items:flex-end;gap:4px;height:100%;}
    .chart-bar{flex:1;border-radius:2px 2px 0 0;min-width:8px;transition:height 0.3s;position:relative;}
    .chart-bar-tip{position:absolute;top:-18px;left:50%;transform:translateX(-50%);
      font-size:8px;color:#666;white-space:nowrap;}
    .no-progress{text-align:center;padding:48px 20px;color:#333;font-size:14px;}

    @media(min-width:600px){
      #modal{border-radius:16px;margin:20px;max-height:85vh;}
      #modal-overlay{align-items:center;}
    }
  </style>
</head>
<body>

<!-- NAV -->
<div id="nav">
  <button class="nav-btn active" onclick="showPage('plan')">Plan</button>
  <button class="nav-btn" onclick="showPage('history')">History</button>
  <button class="nav-btn" onclick="showPage('progress')">Progress</button>
</div>

<!-- PLAN PAGE -->
<div id="page-plan" class="page active">
  <div id="header">
    <div>
      <div class="label">Weekly Program</div>
      <h1>Push / Pull / Legs</h1>
    </div>
    <div class="stats">
      <div>3 DAYS / WEEK</div>
      <div>4 REST DAYS</div>
    </div>
  </div>
  <div id="week-strip"></div>
  <div id="tabs"></div>
  <div id="plan-content">
    <div class="day-tags" id="day-tags"></div>
    <div id="exercise-list"></div>
    <div id="notes-bar">
      <div class="note-block">
        <div class="note-label">Rest Between Sets</div>
        <div class="note-val">Compounds: <span id="na1"></span> · Isolation: <span id="na2"></span></div>
      </div>
      <div class="note-block">
        <div class="note-label">Progression</div>
        <div class="note-val">Add <span id="na3"></span> when hitting top of rep range</div>
      </div>
      <div class="note-block">
        <div class="note-label">Rest Days</div>
        <div class="note-val">Tue / Thu / Sat / Sun — <span id="na4"></span></div>
      </div>
    </div>
  </div>
</div>

<!-- HISTORY PAGE -->
<div id="page-history" class="page">
  <div id="history-content">
    <h2>Session History</h2>
    <div class="sub">All logged workouts</div>
    <div id="history-list"></div>
  </div>
</div>

<!-- PROGRESS PAGE -->
<div id="page-progress" class="page">
  <div id="progress-content">
    <h2>Progress</h2>
    <div class="sub">Best lifts over time</div>
    <div id="progress-list"></div>
  </div>
</div>

<!-- LOG MODAL -->
<div id="modal-overlay" onclick="handleOverlayClick(event)">
  <div id="modal">
    <div id="modal-title"></div>
    <div id="modal-sub"></div>
    <div id="prev-best-box"></div>
    <div style="display:grid;grid-template-columns:28px 1fr 1fr auto;gap:8px;margin-bottom:6px;">
      <div></div>
      <div class="set-label">Weight (kg)</div>
      <div class="set-label">Reps done</div>
      <div></div>
    </div>
    <div id="set-rows"></div>
    <div class="modal-actions">
      <button class="btn-close" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="save-btn" onclick="saveLog()">Save</button>
    </div>
  </div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────
const workoutData = {
  Push: {
    color: "#FF4D1C", accent: "#FF8C6B", icon: "↗", days: ["Monday"],
    exercises: [
      { name: "Flat Bench Press",        sets: 6, reps: "6–8",   note: "Primary compound — focus on chest drive" },
      { name: "Overhead Press",          sets: 4, reps: "8–10",  note: "Keep core tight, avoid lumbar arch" },
      { name: "Incline Dumbbell Press",  sets: 4, reps: "8–10",  note: "Upper chest emphasis" },
      { name: "Cable Lateral Raise",     sets: 4, reps: "8–10",  note: "Slow eccentric, full range" },
      { name: "Tricep Pushdown",         sets: 3, reps: "8–10",  note: "Rope or straight bar" },
      { name: "Overhead Tricep Extension", sets: 3, reps: "8–10", note: "Long head stretch" },
    ],
  },
  Pull: {
    color: "#1C8AFF", accent: "#6BB8FF", icon: "↙", days: ["Wednesday"],
    exercises: [
      { name: "T-Bar Row",               sets: 5, reps: "6–8",   note: "Primary compound — retract scapula fully" },
      { name: "Pull-Ups / Lat Pulldown", sets: 4, reps: "8–10",  note: "Full stretch at top" },
      { name: "Seated Cable Row",        sets: 3, reps: "8–10",  note: "Chest pad, elbows tight" },
      { name: "Face Pulls",              sets: 4, reps: "15–20", note: "External rotation — rear delt health" },
      { name: "Incline Dumbbell Curl",   sets: 3, reps: "8–10",  note: "Long head emphasis" },
      { name: "Hammer Curl",             sets: 3, reps: "8–10",  note: "Brachialis & forearm" },
    ],
  },
  Legs: {
    color: "#1CCF6A", accent: "#6BFFB0", icon: "↓", days: ["Friday"],
    exercises: [
      { name: "Quad Extensions",         sets: 4, reps: "8–10",  note: "Warm-up & quad isolation — slow squeeze at top" },
      { name: "Romanian Deadlift (RDL)", sets: 5, reps: "8–10",  note: "Hamstring stretch — hinge don't squat" },
      { name: "Barbell Squat",           sets: 4, reps: "6–8",   note: "Primary leg compound" },
      { name: "Bulgarian Split Squat",   sets: 3, reps: "8–10",  note: "Per leg — glute & quad" },
      { name: "Leg Curl",                sets: 4, reps: "8–10",  note: "Hamstring complement to RDL" },
      { name: "Standing Calf Raise",     sets: 4, reps: "15–20", note: "Full range, pause at stretch" },
    ],
  },
};

const weekSchedule = [
  { day: "Mon", type: "Push" },
  { day: "Tue", type: "Rest" },
  { day: "Wed", type: "Pull" },
  { day: "Thu", type: "Rest" },
  { day: "Fri", type: "Legs" },
  { day: "Sat", type: "Rest" },
  { day: "Sun", type: "Rest" },
];

// ─── STATE ──────────────────────────────────────────────────────────
let activePlan = "Push";
let currentPage = "plan";
let modalEx = null;
let modalWorkoutType = null;

function getLogs() { try { return JSON.parse(localStorage.getItem('ppl_logs') || '[]'); } catch(e){ return []; } }
function saveLogs(l) { localStorage.setItem('ppl_logs', JSON.stringify(l)); }

// ─── NAV ────────────────────────────────────────────────────────────
function showPage(p) {
  currentPage = p;
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  document.querySelectorAll('.nav-btn')[['plan','history','progress'].indexOf(p)].classList.add('active');
  if (p === 'history') renderHistory();
  if (p === 'progress') renderProgress();
}

// ─── PLAN RENDER ────────────────────────────────────────────────────
function getBestForExercise(exName) {
  const logs = getLogs();
  let best = null;
  logs.forEach(session => {
    (session.exercises || []).forEach(ex => {
      if (ex.name === exName) {
        (ex.sets || []).forEach(s => {
          if (s.weight && s.reps) {
            if (!best || parseFloat(s.weight) > parseFloat(best.weight)) {
              best = s;
            }
          }
        });
      }
    });
  });
  return best;
}

function renderPlan() {
  const current = workoutData[activePlan];

  // Week strip
  document.getElementById("week-strip").innerHTML = weekSchedule.map(({ day, type }) => {
    const isRest = type === "Rest";
    const data = workoutData[type];
    const isActive = !isRest && activePlan === type;
    return `<div class="day-cell ${isRest ? '' : 'clickable'}"
      style="background:${isActive ? '#141414' : 'transparent'}"
      ${isRest ? '' : `onclick="setActivePlan('${type}')"`}>
      <div class="day-name" style="color:${isRest ? '#333' : (isActive ? data.color : '#555')}">${day}</div>
      <div class="day-dot" style="background:${isRest ? '#111' : (isActive ? data.color : '#1a1a1a')};color:${isRest ? '#333' : (isActive ? '#000' : data.color)}">
        ${isRest ? '·' : data.icon}
      </div>
      <div class="day-type" style="color:${isRest ? '#2a2a2a' : (isActive ? '#aaa' : '#333')}">${type}</div>
    </div>`;
  }).join('');

  // Tabs
  document.getElementById("tabs").innerHTML = Object.keys(workoutData).map(type => {
    const d = workoutData[type];
    const isActive = activePlan === type;
    return `<button class="tab-btn"
      style="background:${isActive ? '#111' : 'transparent'};border-bottom:2px solid ${isActive ? d.color : 'transparent'};color:${isActive ? d.color : '#444'}"
      onclick="setActivePlan('${type}')">${d.icon} ${type}</button>`;
  }).join('');

  // Day tags
  document.getElementById("day-tags").innerHTML = current.days.map(d =>
    `<span class="day-tag" style="border:1px solid ${current.color}33;color:${current.accent}">${d}</span>`
  ).join('');

  // Exercises
  document.getElementById("exercise-list").innerHTML = current.exercises.map((ex, i) => {
    const best = getBestForExercise(ex.name);
    const bestHtml = best
      ? `<div class="ex-best" style="color:${current.accent}">Best: ${best.weight}kg × ${best.reps}</div>`
      : `<div class="ex-best" style="color:#333">No logs yet — tap to log</div>`;
    return `<div class="exercise-row"
      style="border-left-color:${i === 0 ? current.color : '#1a1a1a'}"
      onmouseover="this.style.borderLeftColor='${current.color}';this.style.background='#141414'"
      onmouseout="this.style.borderLeftColor='${i === 0 ? current.color : '#1a1a1a'}';this.style.background='#0f0f0f'"
      onclick="openModal('${activePlan}', ${i})">
      <div class="ex-num">${String(i+1).padStart(2,'0')}</div>
      <div>
        <div class="ex-name" style="color:${i === 0 ? current.accent : '#d0ccc6'}">
          ${ex.name}
          ${i === 0 ? `<span class="key-badge" style="color:${current.color};border-color:${current.color}">Key Lift</span>` : ''}
        </div>
        <div class="ex-note">${ex.note}</div>
        ${bestHtml}
      </div>
      <div class="ex-right">
        <div class="ex-sets" style="color:${current.color}">${ex.sets}<span> sets</span></div>
        <div class="ex-reps">${ex.reps} reps</div>
      </div>
    </div>`;
  }).join('');

  // Notes
  ['na1','na2','na3','na4'].forEach(id => document.getElementById(id).style.color = current.accent);
  document.getElementById('na1').textContent = '2–3 min';
  document.getElementById('na2').textContent = '60–90 s';
  document.getElementById('na3').textContent = '2.5–5 kg';
  document.getElementById('na4').textContent = 'active recovery ok';
}

function setActivePlan(type) { activePlan = type; renderPlan(); }

// ─── MODAL ──────────────────────────────────────────────────────────
function openModal(workoutType, exIndex) {
  const ex = workoutData[workoutType].exercises[exIndex];
  const color = workoutData[workoutType].color;
  modalEx = ex;
  modalWorkoutType = workoutType;

  document.getElementById('modal-title').textContent = ex.name;
  document.getElementById('modal-sub').textContent = `${ex.sets} sets · ${ex.reps} reps`;
  document.getElementById('save-btn').style.background = color === '#FF4D1C' ? '#FF4D1C' : color === '#1C8AFF' ? '#1C8AFF' : '#1CCF6A';

  // Previous best
  const best = getBestForExercise(ex.name);
  const prevBox = document.getElementById('prev-best-box');
  prevBox.innerHTML = best
    ? `<div class="prev-best">Previous best: <strong>${best.weight} kg × ${best.reps} reps</strong></div>`
    : `<div class="prev-best">No previous logs for this exercise.</div>`;

  // Set rows - pre-fill with last session values if available
  const lastSession = getLastSessionForExercise(ex.name);
  let rows = '';
  for (let i = 0; i < ex.sets; i++) {
    const last = lastSession && lastSession[i];
    rows += `<div class="set-row">
      <div class="set-num">${String(i+1).padStart(2,'0')}</div>
      <input class="set-input" type="number" inputmode="decimal" placeholder="${last ? last.weight : '0'}" id="w${i}" value="${last ? last.weight : ''}"/>
      <input class="set-input" type="number" inputmode="numeric" placeholder="${last ? last.reps : '0'}" id="r${i}" value="${last ? last.reps : ''}"/>
      <button class="set-done-btn" id="done${i}" onclick="toggleSetDone(${i})"">✓</button>
    </div>`;
  }
  document.getElementById('set-rows').innerHTML = rows;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function getLastSessionForExercise(exName) {
  const logs = getLogs();
  for (let i = logs.length - 1; i >= 0; i--) {
    const session = logs[i];
    const found = (session.exercises || []).find(e => e.name === exName);
    if (found) return found.sets;
  }
  return null;
}

function toggleSetDone(i) {
  const btn = document.getElementById('done' + i);
  btn.classList.toggle('done');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  modalEx = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function saveLog() {
  if (!modalEx) return;
  const sets = [];
  for (let i = 0; i < modalEx.sets; i++) {
    const w = document.getElementById('w' + i).value.trim();
    const r = document.getElementById('r' + i).value.trim();
    if (w || r) sets.push({ weight: w || '0', reps: r || '0', done: document.getElementById('done'+i).classList.contains('done') });
  }
  if (!sets.length) { closeModal(); return; }

  const logs = getLogs();
  const today = new Date().toISOString().split('T')[0];

  // Find existing session for today + workoutType or create new
  let session = logs.find(s => s.date === today && s.type === modalWorkoutType);
  if (!session) {
    session = { date: today, type: modalWorkoutType, exercises: [] };
    logs.push(session);
  }
  const exEntry = session.exercises.find(e => e.name === modalEx.name);
  if (exEntry) exEntry.sets = sets;
  else session.exercises.push({ name: modalEx.name, sets });

  saveLogs(logs);
  closeModal();
  renderPlan();
}

// ─── HISTORY ────────────────────────────────────────────────────────
function renderHistory() {
  const logs = getLogs().slice().reverse();
  const el = document.getElementById('history-list');
  if (!logs.length) {
    el.innerHTML = '<div class="no-history">No sessions logged yet.<br>Tap any exercise to log a set.</div>';
    return;
  }

  el.innerHTML = `<button class="clear-btn" onclick="clearHistory()">Clear all history</button>` +
    logs.map((session, si) => {
      const color = workoutData[session.type]?.color || '#666';
      const d = new Date(session.date);
      const dateStr = d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
      const exHtml = (session.exercises || []).map(ex => {
        const chips = (ex.sets || []).map(s =>
          `<div class="history-set-chip ${s.done ? 'done' : ''}">
            <div class="weight">${s.weight}<span style="font-size:10px;color:#555">kg</span></div>
            <div class="reps-done">${s.reps} reps</div>
          </div>`).join('');
        return `<div class="history-ex">
          <div class="history-ex-name">${ex.name}</div>
          <div class="history-sets-grid">${chips}</div>
        </div>`;
      }).join('');

      return `<div class="history-session">
        <div class="session-header" onclick="toggleSession(${si})">
          <div>
            <div class="session-title">${session.type} Day</div>
            <div class="session-date">${dateStr}</div>
          </div>
          <span class="session-type-badge" style="color:${color};border-color:${color}33">${workoutData[session.type]?.icon || ''} ${session.type}</span>
        </div>
        <div class="session-body" id="sb${si}">${exHtml}</div>
      </div>`;
    }).join('');
}

function toggleSession(i) {
  const el = document.getElementById('sb' + i);
  el.classList.toggle('open');
}

function clearHistory() {
  if (confirm('Clear all history? This cannot be undone.')) {
    saveLogs([]);
    renderHistory();
    renderPlan();
  }
}

// ─── PROGRESS ───────────────────────────────────────────────────────
function renderProgress() {
  const logs = getLogs();
  const el = document.getElementById('progress-list');
  if (!logs.length) {
    el.innerHTML = '<div class="no-progress">No sessions logged yet.<br>Start logging to see your progress.</div>';
    return;
  }

  // Collect all exercise names
  const allExercises = [];
  Object.values(workoutData).forEach(w => w.exercises.forEach(e => {
    if (!allExercises.includes(e.name)) allExercises.push(e.name);
  }));

  let html = '';
  allExercises.forEach(exName => {
    // Collect max weight per session date
    const points = [];
    logs.forEach(session => {
      (session.exercises || []).forEach(ex => {
        if (ex.name === exName) {
          const maxW = Math.max(...(ex.sets || []).map(s => parseFloat(s.weight) || 0));
          const maxR = (ex.sets || []).reduce((best, s) => {
            return (parseFloat(s.weight)||0) > (parseFloat(best.weight)||0) ? s : best;
          }, {weight:'0',reps:'0'});
          if (maxW > 0) points.push({ date: session.date, weight: maxW, reps: maxR.reps });
        }
      });
    });
    if (!points.length) return;

    const workoutType = Object.entries(workoutData).find(([,w]) => w.exercises.some(e => e.name === exName))?.[0];
    const color = workoutData[workoutType]?.color || '#666';
    const best = points.reduce((b, p) => p.weight > b.weight ? p : b, points[0]);
    const maxW = Math.max(...points.map(p => p.weight));
    const last8 = points.slice(-8);

    const bars = last8.map(p => {
      const pct = maxW > 0 ? (p.weight / maxW) * 100 : 0;
      return `<div class="chart-bar" style="height:${Math.max(pct,8)}%;background:${color}88">
        <div class="chart-bar-tip">${p.weight}</div>
      </div>`;
    }).join('');

    html += `<div class="progress-ex-card">
      <div class="progress-ex-header">
        <div class="progress-ex-name">${exName}</div>
        <div class="progress-best">Best: <strong style="color:${color}">${best.weight} kg</strong> × ${best.reps}</div>
      </div>
      <div class="progress-chart">
        <div class="chart-bars">${bars}</div>
      </div>
    </div>`;
  });

  el.innerHTML = html || '<div class="no-progress">Log more sessions to see progress charts.</div>';
}

// ─── SERVICE WORKER ─────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ─── INIT ────────────────────────────────────────────────────────────
renderPlan();
</script>
